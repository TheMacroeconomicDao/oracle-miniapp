<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Oracle Command Center</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #080C10;
    --bg1:       #0D1117;
    --bg2:       #111820;
    --bg3:       #161D28;
    --border:    rgba(255,255,255,0.07);
    --border2:   rgba(255,255,255,0.12);
    --t1:        #E8EDF3;
    --t2:        #8B96A5;
    --t3:        #4A5568;
    --green:     #00D97E;
    --green-dim: rgba(0,217,126,0.12);
    --blue:      #4A9EFF;
    --blue-dim:  rgba(74,158,255,0.10);
    --orange:    #FF9500;
    --red:       #FF3B30;
    --red-dim:   rgba(255,59,48,0.10);
    --yellow:    #FFD60A;
    --purple:    #BF5AF2;
    --cyan:      #64D2FF;
    --mono:      'SF Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--t1);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    font-size: 13px;
    overflow: hidden;
  }

  /* ── LAYOUT ── */
  .dashboard {
    display: grid;
    grid-template-rows: 44px 70px 1fr;
    height: 100vh;
    width: 100vw;
    gap: 0;
  }

  /* ── HEADER ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-brand {
    display: flex; align-items: center; gap: 10px;
  }
  .header-logo {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
  }
  .header-logo svg { opacity: 0.9; }
  .header-title {
    font-size: 12px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--t2);
  }
  .header-divider {
    width: 1px; height: 16px;
    background: var(--border2); margin: 0 6px;
  }
  .header-env {
    font-size: 10px; font-weight: 500; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--t3);
  }
  .header-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase;
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse-green 3s infinite;
  }
  @keyframes pulse-green {
    0%,100% { box-shadow: 0 0 4px var(--green); opacity:1; }
    50%      { box-shadow: 0 0 10px var(--green), 0 0 20px rgba(0,217,126,0.3); }
  }
  .status-text { color: var(--green); }
  .status-dot.degraded { background: var(--orange); box-shadow: 0 0 8px var(--orange); animation: none; }
  .status-dot.degraded ~ .status-text { color: var(--orange); }
  .header-time {
    font-family: var(--mono);
    font-size: 11px; color: var(--t3); letter-spacing: 0.05em;
  }

  /* ── KPI BAR ── */
  .kpi-bar {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    background: var(--bg1);
    border-bottom: 1px solid var(--border);
  }
  .kpi-item {
    padding: 10px 14px;
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 3px;
  }
  .kpi-item:last-child { border-right: none; }
  .kpi-label {
    font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--t3);
  }
  .kpi-value {
    font-family: var(--mono);
    font-size: 22px; font-weight: 500; line-height: 1;
    color: var(--t1);
  }
  .kpi-value.green { color: var(--green); }
  .kpi-value.orange { color: var(--orange); }
  .kpi-meta {
    font-size: 9px; color: var(--t3); margin-top: 1px;
  }

  /* ── MAIN ── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 300px;
    overflow: hidden;
    height: 100%;
  }

  /* ── AGENT MATRIX ── */
  .agent-matrix {
    overflow-y: auto; overflow-x: hidden;
    padding: 12px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .agent-matrix::-webkit-scrollbar { width: 4px; }
  .agent-matrix::-webkit-scrollbar-track { background: transparent; }
  .agent-matrix::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .cluster-section {}
  .cluster-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 6px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .cluster-tag {
    font-size: 9px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 2px 7px;
    border-radius: 3px;
  }
  .cluster-count { font-size: 10px; color: var(--t3); font-family: var(--mono); }

  .agents-row {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 6px;
  }

  .agent-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 11px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative; overflow: hidden;
  }
  .agent-card:hover {
    border-color: var(--border2);
    background: var(--bg3);
  }
  .agent-card.running {
    border-color: rgba(0,217,126,0.3);
    background: rgba(0,217,126,0.04);
  }
  .agent-card.running::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: scan-line 2s linear infinite;
  }
  @keyframes scan-line {
    0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; }
  }
  .agent-card.error { border-color: rgba(255,59,48,0.3); background: var(--red-dim); }

  .agent-card-top {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .agent-name {
    font-size: 12px; font-weight: 600; color: var(--t1);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: calc(100% - 30px);
  }
  .agent-status-badge {
    display: flex; align-items: center; gap: 4px;
    font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; flex-shrink: 0;
  }
  .badge-dot {
    width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0;
  }
  .idle .badge-dot   { background: var(--t3); }
  .running .badge-dot { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse-green 1.5s infinite; }
  .error .badge-dot  { background: var(--red); }
  .idle .badge-label  { color: var(--t3); }
  .running .badge-label { color: var(--green); }
  .error .badge-label { color: var(--red); }

  .agent-task {
    font-size: 10px; color: var(--t2);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    min-height: 13px;
  }
  .agent-task.empty { color: var(--t3); font-style: italic; }
  .agent-meta {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 5px;
  }
  .agent-last-run {
    font-size: 9px; color: var(--t3); font-family: var(--mono);
  }
  .agent-runs-count {
    font-size: 9px; color: var(--t3); font-family: var(--mono);
  }

  /* ── RIGHT PANEL ── */
  .right-panel {
    border-left: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }

  .panel-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .panel-tab {
    flex: 1; padding: 9px 8px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--t3);
    text-align: center; cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .panel-tab.active { color: var(--blue); border-bottom-color: var(--blue); }

  .panel-content { flex: 1; overflow-y: auto; }
  .panel-content::-webkit-scrollbar { width: 3px; }
  .panel-content::-webkit-scrollbar-track { background: transparent; }
  .panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Event feed */
  .feed-item {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-start;
  }
  .feed-item:last-child { border-bottom: none; }
  .feed-dot {
    width: 6px; height: 6px; border-radius: 50%;
    flex-shrink: 0; margin-top: 3px;
  }
  .feed-info { flex: 1; min-width: 0; }
  .feed-event {
    font-size: 10px; font-weight: 600; color: var(--t1);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .feed-detail {
    font-size: 9px; color: var(--t2); margin-top: 1px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .feed-time {
    font-family: var(--mono); font-size: 9px; color: var(--t3);
    flex-shrink: 0;
  }

  /* Task list */
  .task-item {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
  }
  .task-item:last-child { border-bottom: none; }
  .task-top {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 6px;
  }
  .task-name {
    font-size: 11px; font-weight: 500; color: var(--t1);
    line-height: 1.3; flex: 1;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .task-status-tag {
    font-size: 8px; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; padding: 2px 5px;
    border-radius: 3px; flex-shrink: 0;
  }
  .tag-running { background: var(--green-dim); color: var(--green); }
  .tag-done    { background: rgba(255,255,255,0.05); color: var(--t3); }
  .tag-error   { background: var(--red-dim); color: var(--red); }
  .task-meta {
    display: flex; align-items: center; gap: 8px; margin-top: 5px;
  }
  .task-group { font-size: 9px; color: var(--t3); }
  .task-time  { font-family: var(--mono); font-size: 9px; color: var(--t3); margin-left: auto; }
  .task-bar-wrap { margin-top: 5px; height: 2px; background: var(--border); border-radius: 1px; overflow: hidden; }
  .task-bar { height: 100%; border-radius: 1px; transition: width 0.5s; }

  /* Empty state */
  .empty-state {
    padding: 24px 16px; text-align: center;
    color: var(--t3); font-size: 11px;
  }

  /* SSE connection indicator (bottom right) */
  .conn-indicator {
    position: fixed; bottom: 8px; right: 10px;
    display: flex; align-items: center; gap: 5px;
    font-size: 9px; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--t3);
    pointer-events: none;
  }
  .conn-indicator-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--t3);
  }
  .conn-indicator.live .conn-indicator-dot {
    background: var(--green);
    box-shadow: 0 0 5px var(--green);
    animation: pulse-green 2s infinite;
  }
  .conn-indicator.live { color: var(--green); }
</style>
</head>
<body>

<div class="dashboard">

  <!-- HEADER -->
  <header class="header">
    <div class="header-brand">
      <div class="header-logo">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="8" stroke="rgba(74,158,255,0.6)" stroke-width="1"/>
          <circle cx="10" cy="10" r="5" stroke="rgba(74,158,255,0.8)" stroke-width="1"/>
          <circle cx="10" cy="10" r="2" fill="#4A9EFF"/>
          <line x1="10" y1="2" x2="10" y2="0" stroke="#4A9EFF" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="10" y1="18" x2="10" y2="20" stroke="#4A9EFF" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="2" y1="10" x2="0" y2="10" stroke="#4A9EFF" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="18" y1="10" x2="20" y2="10" stroke="#4A9EFF" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="header-title">Oracle</span>
      <div class="header-divider"></div>
      <span class="header-env">Gybernaty R&amp;D</span>
    </div>
    <div class="header-status">
      <div class="status-dot" id="sys-dot"></div>
      <span class="status-text" id="sys-status">OPERATIONAL</span>
    </div>
    <div class="header-time" id="header-time">—</div>
  </header>

  <!-- KPI BAR -->
  <div class="kpi-bar">
    <div class="kpi-item">
      <div class="kpi-label">Active Agents</div>
      <div class="kpi-value green" id="kpi-active">0</div>
      <div class="kpi-meta" id="kpi-active-meta">/ 15 total</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-label">Running Tasks</div>
      <div class="kpi-value" id="kpi-tasks">0</div>
      <div class="kpi-meta" id="kpi-tasks-meta">no active</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-label">Vault Nodes</div>
      <div class="kpi-value" id="kpi-vault">—</div>
      <div class="kpi-meta" id="kpi-vault-meta">knowledge base</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-label">SSE Clients</div>
      <div class="kpi-value" id="kpi-sse">—</div>
      <div class="kpi-meta">live connections</div>
    </div>
    <div class="kpi-item">
      <div class="kpi-label">Uptime</div>
      <div class="kpi-value" id="kpi-uptime" style="font-size:16px;padding-top:3px">—</div>
      <div class="kpi-meta" id="kpi-uptime-meta">since last start</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-grid">

    <!-- AGENT MATRIX -->
    <div class="agent-matrix" id="agent-matrix">
      <div class="empty-state">Loading agent matrix...</div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
      <div class="panel-tabs">
        <div class="panel-tab active" onclick="switchTab('feed')">Event Log</div>
        <div class="panel-tab" onclick="switchTab('tasks')">Tasks</div>
      </div>
      <div class="panel-content" id="panel-feed">
        <div class="empty-state">Waiting for events...</div>
      </div>
      <div class="panel-content" id="panel-tasks" style="display:none">
        <div class="empty-state">No tasks yet</div>
      </div>
    </div>

  </div>
</div>

<div class="conn-indicator" id="conn-indicator">
  <div class="conn-indicator-dot"></div>
  <span>BRIDGE</span>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// ORACLE COMMAND CENTER — Corporate NOC Dashboard
// Receives data via postMessage from miniapp iframe parent
// Falls back to direct API polling in standalone mode
// ═══════════════════════════════════════════════════════════════

const API_BASE = (() => {
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    return 'http://localhost:3000';
  return 'https://oracle.gyber.org/oracle-api';
})();

const IS_IFRAME = window.self !== window.top;

// ── State ─────────────────────────────────────────────────────
const STATE = {
  agents: [],
  groups: [],
  tasks: [],
  status: null,
  events: [],          // event log, max 80
  lastSync: null,
  bridgeConnected: false,
};

// ── Cluster definitions ───────────────────────────────────────
const CLUSTERS = [
  { id: 'security',     label: 'Security',     color: '#FF9500', agents: ['CodeGuard','SecretsWatchdog','CICDGuardian','InfraSentinel','VulnReporter'] },
  { id: 'blockchain',   label: 'Blockchain',   color: '#BF5AF2', agents: ['SolidityAuditor','DAMLArchitect','TokenomicsDesigner'] },
  { id: 'ai',           label: 'AI / ML',      color: '#64D2FF', agents: ['MLResearcher','AIArchitect'] },
  { id: 'architecture', label: 'Architecture', color: '#4A9EFF', agents: ['SysArchitect','PerfEngineer'] },
  { id: 'research',     label: 'Research',     color: '#00D97E', agents: ['Researcher','TheoryAnalyst','TechWriter'] },
];

// ── Clock ─────────────────────────────────────────────────────
setInterval(() => {
  const now = new Date();
  const el = document.getElementById('header-time');
  if (el) el.textContent = now.toLocaleTimeString('en-GB', { hour12: false });
}, 1000);

// ── Tab switch ────────────────────────────────────────────────
let activeTab = 'feed';
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.panel-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='feed') || (i===1 && tab==='tasks'));
  });
  document.getElementById('panel-feed').style.display = tab==='feed' ? '' : 'none';
  document.getElementById('panel-tasks').style.display = tab==='tasks' ? '' : 'none';
}

// ── Render Agent Matrix ───────────────────────────────────────
function renderMatrix() {
  const matrix = document.getElementById('agent-matrix');
  if (!STATE.agents.length) {
    matrix.innerHTML = '<div class="empty-state">Waiting for agent data...</div>';
    return;
  }

  const agentMap = {};
  for (const a of STATE.agents) agentMap[a.name || a.id] = a;

  let html = '';
  for (const cluster of CLUSTERS) {
    const clusterAgents = cluster.agents.map(name => {
      const a = STATE.agents.find(x => (x.name||x.id||'').toLowerCase() === name.toLowerCase()) || { id: name.toLowerCase(), name, status: 'idle' };
      return a;
    });
    const runningCount = clusterAgents.filter(a => a.status === 'running').length;

    html += `<div class="cluster-section">
      <div class="cluster-header">
        <span class="cluster-tag" style="background:${cluster.color}18;color:${cluster.color};border:1px solid ${cluster.color}30">
          ${cluster.label.toUpperCase()}
        </span>
        <span class="cluster-count">${cluster.agents.length} agents${runningCount ? ` · <span style="color:var(--green)">${runningCount} active</span>` : ''}</span>
      </div>
      <div class="agents-row">`;

    for (const a of clusterAgents) {
      const st = a.status || 'idle';
      const isRunning = st === 'running';
      const isError   = st === 'error';
      const lastTask  = a.lastTask || a.currentTask || '';
      const lastRun   = a.lastRun  || '';

      html += `
        <div class="agent-card ${st}" onclick="selectAgent('${a.id||a.name}')">
          <div class="agent-card-top">
            <span class="agent-name">${a.name || a.id}</span>
            <span class="agent-status-badge ${st}">
              <span class="badge-dot"></span>
              <span class="badge-label">${isRunning ? 'RUN' : isError ? 'ERR' : 'IDL'}</span>
            </span>
          </div>
          <div class="agent-task ${lastTask ? '' : 'empty'}">${lastTask || 'No recent task'}</div>
          <div class="agent-meta">
            <span class="agent-last-run">${lastRun || '—'}</span>
          </div>
        </div>`;
    }

    html += `</div></div>`;
  }

  matrix.innerHTML = html;
}

// ── Render KPI ────────────────────────────────────────────────
function renderKPI() {
  const running = STATE.agents.filter(a => a.status === 'running').length;
  const runningTasks = STATE.tasks.filter(t => t.status === 'running').length;

  const kpiActive = document.getElementById('kpi-active');
  if (kpiActive) {
    kpiActive.textContent = running;
    kpiActive.className = `kpi-value ${running > 0 ? 'green' : ''}`;
  }
  const kpiMeta = document.getElementById('kpi-active-meta');
  if (kpiMeta) kpiMeta.textContent = `/ ${STATE.agents.length || 15} total`;

  const kpiTasks = document.getElementById('kpi-tasks');
  if (kpiTasks) kpiTasks.textContent = runningTasks;
  const kpiTasksMeta = document.getElementById('kpi-tasks-meta');
  if (kpiTasksMeta) kpiTasksMeta.textContent = runningTasks ? `${runningTasks} in progress` : 'queue empty';

  const s = STATE.status;
  if (s) {
    const vaultEl = document.getElementById('kpi-vault');
    if (vaultEl && s.vault) vaultEl.textContent = s.vault.totalNotes || '—';
    const sseEl = document.getElementById('kpi-sse');
    if (sseEl) sseEl.textContent = s.sse !== undefined ? s.sse : '—';
    const uptimeEl = document.getElementById('kpi-uptime');
    if (uptimeEl && s.system) uptimeEl.textContent = s.system.uptimeHuman || '—';
  }

  // System status
  const errors = STATE.agents.filter(a => a.status === 'error').length;
  const dot = document.getElementById('sys-dot');
  const txt = document.getElementById('sys-status');
  if (errors > 2) {
    dot?.classList.add('degraded');
    if (txt) txt.textContent = 'DEGRADED';
  } else {
    dot?.classList.remove('degraded');
    if (txt) txt.textContent = 'OPERATIONAL';
  }
}

// ── Render Event Feed ─────────────────────────────────────────
function renderFeed() {
  const feed = document.getElementById('panel-feed');
  if (!STATE.events.length) {
    feed.innerHTML = '<div class="empty-state">No events yet</div>';
    return;
  }
  feed.innerHTML = STATE.events.slice(0, 60).map(ev => {
    const color = ev.type === 'error' ? 'var(--red)'
      : ev.type === 'success' || ev.type === 'agent:idle' ? 'var(--green)'
      : ev.type === 'agent:active' ? 'var(--blue)'
      : 'var(--t3)';
    return `<div class="feed-item">
      <div class="feed-dot" style="background:${color}"></div>
      <div class="feed-info">
        <div class="feed-event">${ev.title || ev.type || 'event'}</div>
        ${ev.detail ? `<div class="feed-detail">${ev.detail}</div>` : ''}
      </div>
      <div class="feed-time">${ev.time || ''}</div>
    </div>`;
  }).join('');
}

// ── Render Tasks ──────────────────────────────────────────────
function renderTasks() {
  const panel = document.getElementById('panel-tasks');
  if (!STATE.tasks.length) {
    panel.innerHTML = '<div class="empty-state">No tasks</div>';
    return;
  }
  panel.innerHTML = STATE.tasks.slice(0, 30).map(t => {
    const st = t.status || 'running';
    const tagClass = st === 'running' ? 'tag-running' : st === 'error' ? 'tag-error' : 'tag-done';
    const barColor = st === 'running' ? 'var(--green)' : st === 'error' ? 'var(--red)' : 'var(--t3)';
    const prog = t.progress ?? (st === 'done' ? 100 : st === 'error' ? 0 : 20);
    const name = t.name || t.task || t.description || 'Task';
    const group = t.group || t.groupId || t.agentName || '';
    const time = t.time || (t.startedAt ? new Date(t.startedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}) : '');
    return `<div class="task-item">
      <div class="task-top">
        <div class="task-name">${name}</div>
        <span class="task-status-tag ${tagClass}">${st}</span>
      </div>
      <div class="task-meta">
        ${group ? `<span class="task-group">${group}</span>` : ''}
        <span class="task-time">${time}</span>
      </div>
      ${st === 'running' ? `<div class="task-bar-wrap"><div class="task-bar" style="width:${prog}%;background:${barColor}"></div></div>` : ''}
    </div>`;
  }).join('');
}

// ── Push event to feed ────────────────────────────────────────
function pushEvent(type, title, detail) {
  const now = new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  STATE.events.unshift({ type, title, detail, time: now });
  if (STATE.events.length > 80) STATE.events.pop();
  if (activeTab === 'feed') renderFeed();
}

// ── Select agent (notify parent) ─────────────────────────────
function selectAgent(agentId) {
  if (IS_IFRAME && window.parent) {
    window.parent.postMessage({ source: 'oracle-office', type: 'agent:selected', agentId }, '*');
  }
}

// ── Full render cycle ─────────────────────────────────────────
function renderAll() {
  renderKPI();
  renderMatrix();
  renderFeed();
  renderTasks();
}

// ── postMessage bridge (from miniapp) ─────────────────────────
window.addEventListener('message', (e) => {
  const msg = e.data;
  if (!msg || typeof msg !== 'object') return;
  if (msg.source !== 'oracle-miniapp') return;

  STATE.bridgeConnected = true;
  STATE.lastSync = Date.now();
  document.getElementById('conn-indicator')?.classList.add('live');

  switch (msg.type) {
    case 'sync': {
      // Full state sync
      if (msg.agents)  STATE.agents = msg.agents;
      if (msg.groups)  STATE.groups = msg.groups;
      if (msg.tasks)   STATE.tasks  = msg.tasks;
      if (msg.status)  STATE.status = msg.status;
      renderAll();
      break;
    }
    case 'agent:active': {
      const a = STATE.agents.find(x => x.runId === msg.runId || x.id === msg.agentId);
      if (a) { a.status = 'running'; a.currentTask = (msg.task||'').slice(0,60); }
      pushEvent('agent:active', `${msg.agentId || 'Agent'} started`, (msg.task||'').slice(0,60));
      renderAll();
      break;
    }
    case 'agent:idle': {
      const a = STATE.agents.find(x => x.runId === msg.runId || x.id === msg.agentId);
      if (a) { a.status = 'idle'; a.runId = null; }
      pushEvent('agent:idle', `${msg.agentId || 'Agent'} completed`, '');
      renderAll();
      break;
    }
    case 'task:dispatched': {
      const t = {
        id: `t-${Date.now()}`,
        name: (msg.task?.slice(0,80) || msg.label || 'Task'),
        group: msg.label || msg.groupId || '',
        status: 'running', progress: 5,
        time: new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}),
        startedAt: Date.now(),
      };
      STATE.tasks.unshift(t);
      if (STATE.tasks.length > 50) STATE.tasks.pop();
      pushEvent('task', `Task dispatched: ${msg.groupId || ''}`, (msg.task||'').slice(0,60));
      renderAll();
      break;
    }
    case 'status:update': {
      if (msg.status) STATE.status = msg.status;
      renderKPI();
      break;
    }
  }
});

// ── Standalone mode (not in iframe): poll API directly ────────
if (!IS_IFRAME) {
  async function apiFetch(path) {
    try {
      const r = await fetch(API_BASE + path, { signal: AbortSignal.timeout(5000) });
      return r.ok ? r.json() : null;
    } catch { return null; }
  }

  async function pollAll() {
    const [agents, status] = await Promise.all([
      apiFetch('/api/agents'),
      apiFetch('/api/status'),
    ]);
    if (agents) {
      STATE.agents = agents.agents || [];
      STATE.groups = agents.groups || [];
    }
    if (status) STATE.status = status;
    renderAll();
  }

  pollAll();
  setInterval(pollAll, 8000);

  // SSE for live events
  try {
    const es = new EventSource(`${API_BASE}/api/events`);
    es.onopen = () => {
      document.getElementById('conn-indicator')?.classList.add('live');
      pushEvent('system', 'SSE connected', API_BASE);
    };
    es.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'agent:active') {
          const a = STATE.agents.find(x => x.id === msg.agentId);
          if (a) { a.status = 'running'; a.currentTask = (msg.task||'').slice(0,60); }
          pushEvent('agent:active', `${msg.agentId || 'Agent'} started`, (msg.task||'').slice(0,50));
          renderAll();
        } else if (msg.type === 'agent:idle') {
          const a = STATE.agents.find(x => x.runId === msg.runId);
          if (a) { a.status = 'idle'; }
          pushEvent('agent:idle', `Agent completed`, '');
          renderMatrix(); renderKPI();
        } else if (msg.type !== 'ping') {
          pushEvent(msg.type, msg.type, JSON.stringify(msg).slice(0,80));
          renderFeed();
        }
      } catch {}
    };
    es.onerror = () => {
      document.getElementById('conn-indicator')?.classList.remove('live');
    };
  } catch {}
} else {
  // In iframe: request initial sync from parent after ready
  setTimeout(() => {
    window.parent?.postMessage({ source: 'oracle-office', type: 'ready' }, '*');
  }, 300);
}

// Initial empty render
renderAll();
</script>
</body>
</html>
